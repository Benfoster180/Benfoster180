name: Update Strava Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # every 24 hours at 06:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv stravalib

      - name: Debug workspace (IMPORTANT)
        run: |
          echo "Current directory:"
          pwd
          echo "Files before running script:"
          ls -R

      - name: Run script
        env:
          STRAVA_ACCESS_TOKEN: ${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        run: python strava.py

      - name: Debug workspace after script
        run: |
          echo "Files after running script:"
          ls -R

        - name: Commit results
          run: |
            ls -la

            if [ ! -f strava_stats.json ]; then
              echo "❌ strava_stats.json was NOT created"
              exit 1
            fi

            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"

            git add strava_stats.json
            git commit -m "update strava stats"
            git push
