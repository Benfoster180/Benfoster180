name: Update Strava Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *" # every 24 hours at 01:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv stravalib

      - name: Debug workspace (before)
        run: |
          echo "PWD:"
          pwd
          echo "Files before:"
          ls -R

      - name: Run script
        env:
          STRAVA_ACCESS_TOKEN: ${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        run: python strava.py

      - name: Debug workspace (after)
        run: |
          echo "Files after:"
          ls -R

      - name: Commit README changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add README.md

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "update strava stats"
          git push
